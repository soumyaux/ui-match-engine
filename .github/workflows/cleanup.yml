name: 🧹 Hourly Storage Cleanup

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  cleanup-storage:
    runs-on: ubuntu-latest
    steps:
      - name: Purge all files in audit-results bucket
        run: |
          # 1. Get the list of files
          # Ensure SUPABASE_URL does NOT have a trailing slash
          RESPONSE=$(curl -s -X GET "${{ secrets.SUPABASE_URL }}/storage/v1/object/list/audit-results" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")

          echo "Response from Supabase: $RESPONSE"

          # 2. Extract names safely using jq
          # The 'select' ensures we don't crash on empty lists
          FILE_NAMES=$(echo $RESPONSE | jq -c '[.[] | .name] | select(. != null)')

          # 3. If files exist, delete them
          if [ "$FILE_NAMES" != "[]" ] && [ "$FILE_NAMES" != "" ]; then
            echo "Deleting: $FILE_NAMES"
            curl -s -X DELETE "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"prefixes\": $FILE_NAMES}"
          else
            echo "Nothing to delete. Bucket is clean! ✅"
          fi
