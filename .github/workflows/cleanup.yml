name: 🧹 Weekly Storage Cleanup

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  cleanup-storage:
    runs-on: ubuntu-latest
    steps:
      - name: Purge all files in audit-results bucket
        run: |
          # 1. 🚨 THE FIX: POST request with prefix payload
          RESPONSE=$(curl -s -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/list/audit-results" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"prefix": ""}')

          echo "Response from Supabase: $RESPONSE"

          # 2. Check for API errors before using jq
          if [[ "$RESPONSE" == *"error"* ]]; then
            echo "❌ ERROR: Supabase returned an error: $RESPONSE"
            exit 1
          fi

          # 3. Safe extraction of filenames
          FILE_NAMES=$(echo "$RESPONSE" | jq -c '[.[] | .name] | select(. != null)')

          # 4. Conditional Delete
          if [ "$FILE_NAMES" != "[]" ] && [ "$FILE_NAMES" != "" ]; then
            echo "Deleting: $FILE_NAMES"
            curl -s -X DELETE "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"prefixes\": $FILE_NAMES}"
          else
            echo "Nothing to delete. ✅"
          fi
