- name: Purge all files in audit-results bucket
        run: |
          # 1. Get the list and capture the full response for debugging
          RESPONSE=$(curl -s -X GET "${{ secrets.SUPABASE_URL }}/storage/v1/object/list/audit-results" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")

          echo "Supabase Response: $RESPONSE"

          # 2. Check if the response is a valid JSON array
          if [[ $RESPONSE == *"error"* ]]; then
            echo "❌ Supabase returned an error: $RESPONSE"
            exit 1
          fi

          # 3. Extract names safely
          FILE_NAMES=$(echo $RESPONSE | jq -c '[.[] | .name] | select(. != null)')

          # 4. Delete if files exist
          if [ "$FILE_NAMES" != "[]" ] && [ "$FILE_NAMES" != "" ]; then
            echo "Removing: $FILE_NAMES"
            curl -s -X DELETE "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"prefixes\": $FILE_NAMES}"
          else
            echo "Bucket is already empty. ✅"
          fi
