name: UI Match Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The target URL to audit'
        required: true
        type: string
      designTokens:
        description: 'The JSON payload from Figma'
        required: true
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Run
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
          node engine.js
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
          TOKENS: ${{ github.event.inputs.designTokens }}
