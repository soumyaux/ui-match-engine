name: UI Match Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The target URL to audit'
        required: true
        type: string
      designTokens:
        description: 'The JSON payload from Figma'
        required: true
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 👀 Check Figma Inputs
        run: |
          echo "Target URL: ${{ github.event.inputs.url }}"
          echo "Design Tokens: ${{ github.event.inputs.designTokens }}"
          
      - name: Install & Run Engine
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
          node engine.js
        # 🚨 MOVED THIS HERE: Now engine.js can read the tokens! 🚨
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
          TOKENS: ${{ github.event.inputs.designTokens }}

      # 🚨 NEW STEP: Zip the Playwright report and push to Supabase
      # 🚨 UPATED: Using the correct SUPABASE_SERVICE_ROLE_KEY
      - name: 📸 Upload Visual Audit Report to Supabase
        if: always() 
        run: |
          # 1. Print the error log to the GitHub screen so we can read it!
          cd playwright-report
          cat error-log.txt || true 
          
          # 2. Zip the folder
          zip -r ../latest-scan.zip ./*
          cd ..

          # 3. Upload to Supabase
          curl -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results/latest-scan.zip" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/zip" \
            -H "x-upsert: true" \
            --data-binary @"./latest-scan.zip"
