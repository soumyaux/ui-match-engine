name: UI Match Audit

on:
  workflow_dispatch:
    inputs:
      scan_id:
        description: "Supabase Scan ID"
        required: false
        default: ""
      url:
        description: "Target URL"
        required: true
      session_id:
        description: "Unique ID"
        required: false
        default: "manual-scan"
      tokens_url:
        description: "URL to design tokens JSON in Supabase Storage"
        required: false
        default: ""
      figma_image_url:
        description: "URL to Figma frame PNG in Supabase Storage"
        required: false
        default: ""
      frame_name:
        description: "Figma frame name"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read   # least privilege — workflow only needs to read repo files

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 🚦 Mark Scan Running
        if: ${{ github.event.inputs.scan_id != '' }}
        run: |
          SCAN_ID="${{ github.event.inputs.scan_id }}"
          curl -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/scan_history?id=eq.$SCAN_ID" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"audit_status": "running"}'


      - name: 📥 Download Design Tokens
        if: ${{ github.event.inputs.tokens_url != '' }}
        run: |
          curl -sL "${{ github.event.inputs.tokens_url }}" -o tokens.json
          echo "Tokens file size: $(wc -c < tokens.json) bytes"
          echo "Token count: $(cat tokens.json | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))' 2>/dev/null || echo 'unknown')"

      - name: 🖼️ Download Figma Frame Image
        if: ${{ github.event.inputs.figma_image_url != '' }}
        run: |
          curl -sL "${{ github.event.inputs.figma_image_url }}" -o figma-frame.png
          echo "Figma image size: $(wc -c < figma-frame.png) bytes"

      - name: 📦 Cache Node Modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-npm-

      - name: 📦 Cache Playwright Binaries
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install & Run Engine
        run: |
          npm install playwright pixelmatch pngjs
          if [ "${{ steps.cache-playwright.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps chromium
          fi
          node engine.js
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
          TOKENS_FILE: tokens.json
          FIGMA_IMAGE: figma-frame.png
          FRAME_NAME: ${{ github.event.inputs.frame_name }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCAN_ID: ${{ github.event.inputs.scan_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 📸 Upload Visual Audit Report to Supabase
        if: always()
        env:
          SESSION_ID: ${{ github.event.inputs.session_id }}
          SCAN_ID: ${{ github.event.inputs.scan_id }}
        run: |
          FINAL_ID="${SESSION_ID:-manual_run}"
          FILENAME="${FINAL_ID}.zip"

          cd playwright-report
          zip -r ../$FILENAME ./*
          cd ..

          curl -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results/$FILENAME" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/zip" \
            -H "x-upsert: true" \
            --data-binary @"./$FILENAME"

          # Also upload the PDF and PNG directly (so plugin can fetch without unzipping)
          if [ -f "playwright-report/visual-audit-diff.pdf" ]; then
            curl -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results/${FINAL_ID}.pdf" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/pdf" \
              -H "x-upsert: true" \
              --data-binary @"playwright-report/visual-audit-diff.pdf"
            echo "PDF uploaded directly"
          fi
          if [ -f "playwright-report/visual-audit-diff.png" ]; then
            curl -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results/${FINAL_ID}.png" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: image/png" \
              -H "x-upsert: true" \
              --data-binary @"playwright-report/visual-audit-diff.png"
            echo "PNG uploaded directly"
          fi

          echo "Report uploaded successfully"

      - name: ✅ Update Scan Status to Completed
        if: ${{ success() && github.event.inputs.scan_id != '' }}
        run: |
          SCAN_ID="${{ github.event.inputs.scan_id }}"

          # Extract scores from the engine output, default to 0 if missing
          TRUE_SCORE=$(jq -r '.trueMatchScore // 0' playwright-report/audit-results.json 2>/dev/null || echo 0)
          VISUAL_SCORE=$(jq -r '.visualMatchScore // 0' playwright-report/audit-results.json 2>/dev/null || echo 0)

          curl -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/scan_history?id=eq.$SCAN_ID" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"audit_status\": \"completed\", \"true_match_percent\": $TRUE_SCORE, \"visual_match_percent\": $VISUAL_SCORE}"

      - name: ❌ Update Scan Status to Failed
        if: ${{ failure() && github.event.inputs.scan_id != '' }}
        run: |
          SCAN_ID="${{ github.event.inputs.scan_id }}"

          # Read error message from engine report if available
          ERROR_MSG="Audit failed unexpectedly."
          if [ -f "playwright-report/error-log.txt" ]; then
            ERROR_MSG=$(cat playwright-report/error-log.txt | head -c 500)
          fi
          # Escape for JSON
          ERROR_JSON=$(echo "$ERROR_MSG" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))' 2>/dev/null || echo '"Audit failed"')
          curl -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/scan_history?id=eq.$SCAN_ID" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"audit_status\": \"failed\", \"error_message\": $ERROR_JSON}"
