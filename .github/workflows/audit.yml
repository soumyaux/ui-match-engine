name: UI Match Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URL'
        required: true
      designTokens:
        description: 'Figma Tokens'
        required: false
        default: '{}'
      sessionId:
        description: 'Unique ID'
        required: false
        default: 'manual-scan'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 👀 Check Figma Inputs
        run: |
          echo "Target URL: ${{ github.event.inputs.url }}"
          echo "Design Tokens: ${{ github.event.inputs.designTokens }}"
          
      - name: Install & Run Engine
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
          node engine.js
        # 🚨 MOVED THIS HERE: Now engine.js can read the tokens! 🚨
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
          TOKENS: ${{ github.event.inputs.designTokens }}

      # 🚨 NEW STEP: Zip the Playwright report and push to Supabase
      # 🚨 UPATED: Using the correct SUPABASE_SERVICE_ROLE_KEY
      - name: 📸 Upload Visual Audit Report to Supabase
        if: always() 
        env:
          # 🚨 Use .inputs. because your Worker uses 'workflow_dispatch'
          SESSION_ID: ${{ github.event.inputs.sessionId }}
        run: |
          FINAL_ID="${SESSION_ID:-manual_run}"
          FILENAME="${FINAL_ID}.zip"
          
          cd playwright-report
          zip -r ../$FILENAME ./*
          cd ..

          curl -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results/$FILENAME" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/zip" \
            -H "x-upsert: true" \
            --data-binary @"./$FILENAME"
