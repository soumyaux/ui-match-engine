name: UI Match Audit

on:
  workflow_dispatch:
    inputs:
      scan_id:
        description: "Supabase Scan ID"
        required: false
        default: ""
      url:
        description: "Target URL"
        required: true
      session_id:
        description: "Unique ID"
        required: false
        default: "manual-scan"
      tokens_url:
        description: "URL to design tokens JSON in Supabase Storage"
        required: false
        default: ""
      figma_image_url:
        description: "URL to Figma frame PNG in Supabase Storage"
        required: false
        default: ""
      frame_name:
        description: "Figma frame name"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: 🚦 Mark Scan Running
        if: ${{ github.event.inputs.scan_id != '' }}
        run: |
          curl -sX PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/scan_history?id=eq.${{ github.event.inputs.scan_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"audit_status": "running"}'

      - name: 📥 Download Tokens + Figma Image (parallel)
        run: |
          if [ -n "${{ github.event.inputs.tokens_url }}" ]; then
            curl -sL "${{ github.event.inputs.tokens_url }}" -o tokens.json &
          fi
          if [ -n "${{ github.event.inputs.figma_image_url }}" ]; then
            curl -sL "${{ github.event.inputs.figma_image_url }}" -o figma-frame.png &
          fi
          wait
          [ -f tokens.json ] && echo "Tokens: $(wc -c < tokens.json) bytes"
          [ -f figma-frame.png ] && echo "Figma PNG: $(wc -c < figma-frame.png) bytes"

      - name: 📦 Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-v1-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-v1-

      - name: 📦 Cache Playwright Binaries
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm install playwright pixelmatch pngjs

      - name: Install Playwright Browser
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: 🔍 Run Audit Engine
        run: node engine.js
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
          TOKENS_FILE: tokens.json
          FIGMA_IMAGE: figma-frame.png
          FRAME_NAME: ${{ github.event.inputs.frame_name }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCAN_ID: ${{ github.event.inputs.scan_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 📸 Upload PDF Report to Supabase
        if: always()
        run: |
          FINAL_ID="${{ github.event.inputs.session_id }}"
          FINAL_ID="${FINAL_ID:-manual_run}"
          if [ -f "playwright-report/visual-audit-diff.pdf" ]; then
            curl -sX POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results/${FINAL_ID}.pdf" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/pdf" \
              -H "x-upsert: true" \
              --data-binary @"playwright-report/visual-audit-diff.pdf"
            echo "PDF uploaded"
          else
            echo "No PDF found"
          fi

      - name: ✅ Mark Completed
        if: ${{ success() && github.event.inputs.scan_id != '' }}
        run: |
          TRUE_SCORE=$(jq -r '.trueMatchScore // 0' playwright-report/audit-results.json 2>/dev/null || echo 0)
          VISUAL_SCORE=$(jq -r '.visualMatchScore // 0' playwright-report/audit-results.json 2>/dev/null || echo 0)
          curl -sX PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/scan_history?id=eq.${{ github.event.inputs.scan_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"audit_status\": \"completed\", \"true_match_percent\": $TRUE_SCORE, \"visual_match_percent\": $VISUAL_SCORE}"

      - name: ❌ Mark Failed
        if: ${{ failure() && github.event.inputs.scan_id != '' }}
        run: |
          ERROR_MSG="Audit failed unexpectedly."
          [ -f "playwright-report/error-log.txt" ] && ERROR_MSG=$(head -c 500 playwright-report/error-log.txt)
          ERROR_JSON=$(echo "$ERROR_MSG" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))' 2>/dev/null || echo '"Audit failed"')
          curl -sX PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/scan_history?id=eq.${{ github.event.inputs.scan_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"audit_status\": \"failed\", \"error_message\": $ERROR_JSON}"
