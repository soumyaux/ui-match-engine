name: UI Match Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The target URL to audit'
        required: true
        type: string
      designTokens:
        description: 'The JSON payload from Figma'
        required: true
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 👀 Check Figma Inputs
        run: |
          echo "Target URL: ${{ github.event.inputs.url }}"
          echo "Design Tokens: ${{ github.event.inputs.designTokens }}"
          
      - name: Install & Run Engine
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
          node engine.js
        # 🚨 MOVED THIS HERE: Now engine.js can read the tokens! 🚨
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
          TOKENS: ${{ github.event.inputs.designTokens }}

      # 🚨 NEW STEP: Zip the Playwright report and push to Supabase
      - name: 📸 Upload Visual Audit Report to Supabase
        if: always() # We keep this so it uploads even if the UI scan finds errors!
        run: |
          # 1. Zip the Playwright report folder into a single file
          cd playwright-report
          zip -r ../latest-scan.zip ./*
          cd ..

          # 2. Upload that zip file directly to your Supabase bucket
          curl -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results/latest-scan.zip" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/zip" \
            -H "x-upsert: true" \
            --data-binary @"./latest-scan.zip"
