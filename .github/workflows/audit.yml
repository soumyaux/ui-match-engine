name: UI Match Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URL'
        required: true
      session_id:
        description: 'Unique ID'
        required: false
        default: 'manual-scan'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 👀 Check Inputs
        run: |
          echo "Target URL: ${{ github.event.inputs.url }}"
          echo "Session ID: ${{ github.event.inputs.session_id }}"

      - name: Install & Run Engine
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
          node engine.js
        env:
          TARGET_URL: ${{ github.event.inputs.url }}

      - name: 📸 Upload Visual Audit Report to Supabase
        if: always()
        env:
          SESSION_ID: ${{ github.event.inputs.session_id }}
        run: |
          FINAL_ID="${SESSION_ID:-manual_run}"
          FILENAME="${FINAL_ID}.zip"

          cd playwright-report
          zip -r ../$FILENAME ./*
          cd ..

          curl -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/audit-results/$FILENAME" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/zip" \
            -H "x-upsert: true" \
            --data-binary @"./$FILENAME"

      - name: ✅ Update Scan Status to Completed
        if: success()
        run: |
          echo "Skipped (no DB status update needed)"

      - name: ❌ Update Scan Status to Failed
        if: failure()
        run: |
          echo "Skipped (no DB status update needed)"
